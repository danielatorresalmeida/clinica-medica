<!DOCTYPE html>

<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registar Utilizador</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<main>
    <h1>Registar Utilizador</h1>

<!-- Menu principal com permissões por tipo de utilizador -->
<nav class="menu">

    <!-- Todos os utilizadores logados -->
    <a th:if="${session.utilizadorLogado != null}"
       href="/">
        Página Principal
    </a>

    <!-- Apenas ADMIN pode criar utilizadores -->
    <a th:if="${session.utilizadorLogado != null and session.utilizadorLogado.tipo == 'ADMIN'}"
       href="/registar-utilizador">
        Registar Utilizador
    </a>

    <!-- ADMIN e SECRETARIA podem ver a listagem geral -->
    <a th:if="${session.utilizadorLogado != null and 
              (session.utilizadorLogado.tipo == 'ADMIN' or session.utilizadorLogado.tipo == 'SECRETARIA')}"
       href="/listagem">
        Listagem Geral
    </a>

    <!-- ADMIN e SECRETARIA podem ver pacientes -->
    <a th:if="${session.utilizadorLogado != null and 
              (session.utilizadorLogado.tipo == 'ADMIN' or session.utilizadorLogado.tipo == 'SECRETARIA')}"
       href="/pacientes">
        Pacientes
    </a>

    <!-- ADMIN e SECRETARIA podem ver médicos -->
    <a th:if="${session.utilizadorLogado != null and 
              (session.utilizadorLogado.tipo == 'ADMIN' or session.utilizadorLogado.tipo == 'SECRETARIA')}"
       href="/medicos">
        Médicos
    </a>

    <!-- ADMIN e SECRETARIA podem ver secretárias -->
    <a th:if="${session.utilizadorLogado != null and 
              (session.utilizadorLogado.tipo == 'ADMIN' or session.utilizadorLogado.tipo == 'SECRETARIA')}"
       href="/secretarias">
        Secretárias
    </a>

    <!-- ADMIN, SECRETARIA, MÉDICO e PACIENTE podem ver consultas -->
    <a th:if="${session.utilizadorLogado != null}"
       href="/consultas">
        Consultas
    </a>

    <!-- ADMIN, SECRETARIA, MÉDICO e PACIENTE podem ver exames -->
    <a th:if="${session.utilizadorLogado != null}"
       href="/exames">
        Exames
    </a>

    <!-- ADMIN, SECRETARIA, MÉDICO e PACIENTE podem ver receitas -->
    <a th:if="${session.utilizadorLogado != null}"
       href="/receitas">
        Receitas
    </a>

    <!-- ADMIN, SECRETARIA e MÉDICO podem ver disponibilidades -->
    <a th:if="${session.utilizadorLogado != null and 
              (session.utilizadorLogado.tipo == 'ADMIN' 
               or session.utilizadorLogado.tipo == 'SECRETARIA'
               or session.utilizadorLogado.tipo == 'MEDICO')}"
       href="/disponibilidades">
        Disponibilidades
    </a>

    <!-- Logout para todos os utilizadores logados -->
    <a th:if="${session.utilizadorLogado != null}"
       href="/logout">
        Logout
    </a>

    <!-- Login só aparece se ninguém estiver logado -->
    <a th:if="${session.utilizadorLogado == null}"
       href="/login">
        Login
    </a>

</nav>

<!-- Informação do utilizador logado -->
<section class="utilizador-logado" th:if="${session.utilizadorLogado != null}">
    <p>
        Utilizador logado:
        <strong th:text="${session.utilizadorLogado.nome}"></strong>
        |
        Tipo:
        <strong th:text="${session.utilizadorLogado.tipo}"></strong>
    </p>
</section>

<hr>

<section class="form-card form-unico">
    <h2>Novo Utilizador</h2>

    <form action="/registo/utilizador" method="post">

        <label>Tipo de utilizador:</label>
        <select name="tipo" id="tipoUtilizador" required>
            <option value="" disabled selected>Selecione</option>
            <option value="ADMIN">Administrador</option>
            <option value="PACIENTE">Paciente</option>
            <option value="MEDICO">Médico</option>
            <option value="SECRETARIA">Secretária</option>
        </select>

        <label>Nome completo:</label>
        <input type="text" name="nome" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Senha:</label>
        <input type="password" name="senha" required>

        <label>Data de nascimento:</label>
        <input type="date" name="dataNascimento" required>

        <label>Telefone:</label>
        <input type="text" name="telefone" required>

        <label>Endereço:</label>
        <input type="text" name="endereco" required>

        <!-- Especialidade do médico -->
        <label for="especialidade">Especialidade:</label>

        <select id="especialidade" name="especialidade">
        <option value="">Selecione uma especialidade</option>

        <!-- Lista as especialidades vindas da base de dados -->
        <option th:each="esp : ${especialidades}"
                th:value="${esp.nome}"
                th:text="${esp.nome}">
        </option>
    </select>

        <button type="submit">Registar novo utilizador</button>
        </form>
    </section>

</main>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
