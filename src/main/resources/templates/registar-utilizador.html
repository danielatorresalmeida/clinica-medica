<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registar Utilizador | Clínica Médica</title>

    <link rel="stylesheet" th:href="@{/css/registar-utilizador.css}" href="/css/registar-utilizador.css" />
</head>

<body>
    <div class="page-shell" th:with="utilizador=${session.utilizadorLogado}">
        <span class="decor decor-top-right" aria-hidden="true"></span>
        <span class="decor decor-bottom-left" aria-hidden="true"></span>

        <main class="layout">
            <header class="topbar">
                <div class="brand" aria-label="Clínica Médica">
                    <div class="brand-logo" aria-hidden="true">
                        <span class="medical-cross vertical"></span>
                        <span class="medical-cross horizontal"></span>
                    </div>

                    <div>
                        <h1>Clínica Médica</h1>
                        <p>Sistema de gestão clínica</p>
                    </div>
                </div>

                <nav class="nav-actions" aria-label="Navegação principal">
                    <a class="nav-link" th:href="@{/home}" href="/home">
                        Página Principal
                    </a>

                    <a class="nav-link"
                       th:if="${utilizador != null and (utilizador.tipo == 'ADMIN' or utilizador.tipo == 'SECRETARIA')}"
                       th:href="@{/listagem}"
                       href="/listagem">
                        Listagem Geral
                    </a>

                    <a class="nav-link"
                       th:if="${utilizador != null}"
                       th:href="@{/logout}"
                       href="/logout">
                        Logout
                    </a>
                </nav>
            </header>

            <section class="page-heading">
                <p class="eyebrow">Administração</p>
                <h2>Registar utilizador</h2>
                <p>
                    Crie um novo acesso ao sistema e defina o perfil do utilizador.
                    A especialidade só é necessária quando o tipo escolhido for Médico.
                </p>
            </section>

            <section class="form-card">
                <form th:action="@{/registo/utilizador}" action="/registo/utilizador" method="post">
                    <div class="form-grid">

                        <div class="field-group">
                            <label for="tipoUtilizador">
                                Tipo de utilizador <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <select name="tipo" id="tipoUtilizador" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="ADMIN">Administrador</option>
                                    <option value="PACIENTE">Paciente</option>
                                    <option value="MEDICO">Médico</option>
                                    <option value="SECRETARIA">Secretária</option>
                                </select>
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="nome">
                                Nome completo <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="nome" type="text" name="nome" placeholder="Nome do utilizador" required />
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="email">
                                Email <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="email" type="email" name="email" placeholder="utilizador@clinica.pt" required />
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="senha">
                                Senha <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="senha" type="password" name="senha" placeholder="Definir senha" required />
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="dataNascimento">
                                Data de nascimento <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="dataNascimento" type="date" name="dataNascimento" required />
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="telefone">
                                Telefone <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="telefone" type="text" name="telefone" placeholder="912 345 678" required />
                            </div>
                        </div>

                        <div class="field-group full">
                            <label for="endereco">
                                Endereço <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <input id="endereco" type="text" name="endereco" placeholder="Rua, número, localidade" required />
                            </div>
                        </div>

                        <div class="field-group escondida" id="campoEspecialidade">
                            <label for="especialidade">
                                Especialidade <span class="required">*</span>
                            </label>

                            <div class="input-control">
                                <select id="especialidade" name="especialidade">
                                    <option value="">Selecione uma especialidade</option>

                                    <option th:each="esp : ${especialidades}"
                                            th:value="${esp.nome}"
                                            th:text="${esp.nome}">
                                        Cardiologia
                                    </option>
                                </select>
                            </div>
                        </div>

                    </div>

                    <div class="form-actions">
                        <a class="button button-secondary" th:href="@{/home}" href="/home">
                            Cancelar
                        </a>

                        <button class="button button-primary" type="submit">
                            Registar novo utilizador
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
</body>
</html>
